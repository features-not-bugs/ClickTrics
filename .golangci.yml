run:
  timeout: 5m
  go: "1.26"

linters:
  disable-all: true
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - gocritic
    - gosec
    - misspell
    - unconvert
    - unparam
    - revive
    - bodyclose
    - errorlint
    - nilerr
    - prealloc

linters-settings:
  gocritic:
    enabled-tags:
      - performance
      - style
      - diagnostic
    disabled-checks:
      - ifElseChain
      - hugeParam
      # rangeValCopy fires on every `for k, v := range mapOfStructs` — even
      # when there's no workaround since map values aren't addressable.
      - rangeValCopy
  gosec:
    excludes:
      - G104  # errors unhandled; errcheck covers it
  revive:
    rules:
      - name: exported
        disabled: false

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
        - errcheck
        - unparam
